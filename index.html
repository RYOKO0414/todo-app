<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f4f3f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 20px;
    }

    .container { width: 100%; max-width: 500px; }

    .header {
      background: #1c1c1e;
      border-radius: 20px;
      padding: 28px 28px 24px;
      margin-bottom: 12px;
      color: white;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .header-top h1 {
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    .header-top .date {
      font-size: 0.78rem;
      color: #888;
      text-align: right;
      line-height: 1.5;
    }

    .stats { display: flex; gap: 12px; }

    .stat {
      flex: 1;
      background: #2c2c2e;
      border-radius: 12px;
      padding: 12px 14px;
    }

    .stat .num {
      font-size: 1.4rem;
      font-weight: 600;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat .label { font-size: 0.72rem; color: #888; }
    .stat.accent .num { color: #a78bfa; }

    .input-card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .input-row input {
      flex: 1;
      border: none;
      font-family: inherit;
      font-size: 0.95rem;
      color: #1c1c1e;
      outline: none;
      background: #f7f7f5;
      border-radius: 10px;
      padding: 11px 14px;
    }

    .input-row input::placeholder { color: #bbb; }

    .add-btn {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: #1c1c1e;
      color: white;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, background 0.15s;
    }

    .add-btn:hover { background: #3a3a3c; transform: scale(1.05); }
    .add-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

    .meta-row { display: flex; gap: 8px; }

    .meta-row select,
    .meta-row input[type="date"] {
      flex: 1;
      border: 1.5px solid #ececec;
      background: white;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.8rem;
      font-family: inherit;
      color: #555;
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .meta-row select:focus,
    .meta-row input[type="date"]:focus { border-color: #a78bfa; }

    .filters {
      display: flex;
      background: white;
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .filters button {
      flex: 1;
      border: none;
      background: none;
      font-family: inherit;
      font-size: 0.82rem;
      color: #999;
      cursor: pointer;
      padding: 9px 0;
      border-radius: 10px;
      transition: all 0.2s;
      font-weight: 500;
    }

    .filters button.active {
      background: #1c1c1e;
      color: white;
    }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-item {
      background: white;
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      animation: slideIn 0.2s ease;
      transition: box-shadow 0.2s;
    }

    .todo-item:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .check-wrap input[type="checkbox"] {
      appearance: none;
      width: 20px;
      height: 20px;
      border: 2px solid #e5e5e5;
      border-radius: 6px;
      cursor: pointer;
      display: block;
      flex-shrink: 0;
      margin-top: 1px;
      transition: all 0.15s;
      position: relative;
    }

    .check-wrap input[type="checkbox"]:checked {
      background: #1c1c1e;
      border-color: #1c1c1e;
    }

    .check-wrap input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 1px;
      width: 6px;
      height: 10px;
      border: 2px solid white;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .item-body { flex: 1; min-width: 0; }

    .item-text {
      font-size: 0.92rem;
      color: #1c1c1e;
      line-height: 1.5;
      margin-bottom: 8px;
      word-break: break-word;
    }

    .todo-item.done .item-text {
      text-decoration: line-through;
      color: #c7c7c7;
    }

    .item-tags { display: flex; gap: 6px; flex-wrap: wrap; }

    .tag {
      font-size: 0.72rem;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 20px;
    }

    .tag-high   { background: #fce7e7; color: #e03131; }
    .tag-medium { background: #fff4e0; color: #e67700; }
    .tag-low    { background: #e6f7ee; color: #2f9e44; }
    .tag-deadline { background: #ede9fe; color: #7c3aed; }
    .tag-overdue  { background: #fce7e7; color: #e03131; }
    .tag-today    { background: #fff4e0; color: #e67700; }

    .delete-btn {
      background: none;
      border: none;
      color: #e0e0e0;
      font-size: 0.85rem;
      cursor: pointer;
      padding: 3px;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: #e03131; }

    .empty {
      text-align: center;
      color: #ccc;
      font-size: 0.85rem;
      padding: 48px 0;
    }

    .loading {
      text-align: center;
      color: #bbb;
      font-size: 0.85rem;
      padding: 48px 0;
    }

    .footer {
      margin-top: 16px;
      display: flex;
      justify-content: flex-end;
    }

    .footer button {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 0.78rem;
      color: #bbb;
      cursor: pointer;
      transition: color 0.15s;
    }

    .footer button:hover { color: #e03131; }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="header-top">
        <h1>タスク</h1>
        <div class="date" id="dateLabel"></div>
      </div>
      <div class="stats">
        <div class="stat accent">
          <div class="num" id="statRemaining">—</div>
          <div class="label">残りタスク</div>
        </div>
        <div class="stat">
          <div class="num" id="statDone">—</div>
          <div class="label">完了済み</div>
        </div>
        <div class="stat">
          <div class="num" id="statOverdue">—</div>
          <div class="label">期限切れ</div>
        </div>
      </div>
    </div>

    <div class="input-card">
      <div class="input-row">
        <input id="newTask" type="text" placeholder="新しいタスクを追加..." />
        <button class="add-btn" id="addBtn" onclick="addTask()">＋</button>
      </div>
      <div class="meta-row">
        <select id="newPriority">
          <option value="high">🔴 優先度：高</option>
          <option value="medium" selected>🟡 優先度：中</option>
          <option value="low">🟢 優先度：低</option>
        </select>
        <input type="date" id="newDeadline" />
      </div>
    </div>

    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">すべて</button>
      <button onclick="setFilter('active', this)">未完了</button>
      <button onclick="setFilter('done', this)">完了済み</button>
    </div>

    <div class="todo-list" id="todoList"><div class="loading">読み込み中...</div></div>

    <div class="footer">
      <button onclick="clearDone()">完了済みを削除</button>
    </div>

  </div>

  <script>
    const SUPABASE_URL = 'https://cfbljcqrxdfwdbibyzsn.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmYmxqY3FyeGRmd2RiaWJ5enNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMjM0ODYsImV4cCI6MjA5NjY5OTQ4Nn0.lRglflRjxfiFApOPPAhlo3nacElwfQWU6SXtH5JIv00';

    const headers = {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };

    let tasks = [];
    let filter = 'all';

    async function fetchTasks() {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/todos?order=created_at.desc`, { headers });
      tasks = await res.json();
      render();
    }

    async function addTask() {
      const input = document.getElementById('newTask');
      const text = input.value.trim();
      if (!text) return;
      const btn = document.getElementById('addBtn');
      btn.disabled = true;
      const body = JSON.stringify({
        text,
        done: false,
        priority: document.getElementById('newPriority').value,
        deadline: document.getElementById('newDeadline').value || null,
      });
      const res = await fetch(`${SUPABASE_URL}/rest/v1/todos`, { method: 'POST', headers, body });
      const [newTask] = await res.json();
      tasks.unshift(newTask);
      input.value = '';
      document.getElementById('newDeadline').value = '';
      btn.disabled = false;
      render();
    }

    async function toggle(id, done) {
      await fetch(`${SUPABASE_URL}/rest/v1/todos?id=eq.${id}`, {
        method: 'PATCH', headers,
        body: JSON.stringify({ done: !done })
      });
      const t = tasks.find(t => t.id === id);
      if (t) t.done = !done;
      render();
    }

    async function remove(id) {
      await fetch(`${SUPABASE_URL}/rest/v1/todos?id=eq.${id}`, { method: 'DELETE', headers });
      tasks = tasks.filter(t => t.id !== id);
      render();
    }

    async function clearDone() {
      await fetch(`${SUPABASE_URL}/rest/v1/todos?done=eq.true`, { method: 'DELETE', headers });
      tasks = tasks.filter(t => !t.done);
      render();
    }

    function todayStr() { return new Date().toISOString().slice(0, 10); }

    function formatDate(d) {
      if (!d) return '';
      const [y, m, day] = d.split('-');
      return `${parseInt(m)}/${parseInt(day)}`;
    }

    function deadlineTag(deadline) {
      if (!deadline) return '';
      const t = todayStr();
      if (deadline < t)   return `<span class="tag tag-overdue">⚠ 期限切れ ${formatDate(deadline)}</span>`;
      if (deadline === t) return `<span class="tag tag-today">🔔 今日まで</span>`;
      return `<span class="tag tag-deadline">📅 ${formatDate(deadline)}</span>`;
    }

    function priorityTag(p) {
      if (p === 'high')   return '<span class="tag tag-high">高</span>';
      if (p === 'medium') return '<span class="tag tag-medium">中</span>';
      return '<span class="tag tag-low">低</span>';
    }

    function render() {
      const list = document.getElementById('todoList');
      const filtered = tasks.filter(t =>
        filter === 'all' ? true : filter === 'active' ? !t.done : t.done
      );

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">タスクがありません</div>';
      } else {
        list.innerHTML = filtered.map(t => `
          <div class="todo-item ${t.done ? 'done' : ''}">
            <div class="check-wrap">
              <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id}, ${t.done})">
            </div>
            <div class="item-body">
              <div class="item-text">${escHtml(t.text)}</div>
              <div class="item-tags">
                ${priorityTag(t.priority || 'medium')}
                ${deadlineTag(t.deadline)}
              </div>
            </div>
            <button class="delete-btn" onclick="remove(${t.id})">✕</button>
          </div>
        `).join('');
      }

      const t = todayStr();
      document.getElementById('statRemaining').textContent = tasks.filter(t => !t.done).length;
      document.getElementById('statDone').textContent      = tasks.filter(t => t.done).length;
      document.getElementById('statOverdue').textContent   = tasks.filter(t => !t.done && t.deadline && t.deadline < todayStr()).length;
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.getElementById('newTask').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    const now = new Date();
    const days = ['日','月','火','水','木','金','土'];
    document.getElementById('dateLabel').innerHTML =
      `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日<br>${days[now.getDay()]}曜日`;

    fetchTasks();
  </script>
</body>
</html>
