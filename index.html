<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #fafafa;
      color: #111;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 64px 24px;
    }

    .container { width: 100%; max-width: 480px; }

    header {
      margin-bottom: 48px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #111;
    }

    header p {
      font-size: 0.85rem;
      color: #999;
      margin-top: 4px;
    }

    /* Input */
    .input-area {
      margin-bottom: 32px;
    }

    .input-main {
      display: flex;
      align-items: center;
      border-bottom: 1.5px solid #e5e5e5;
      padding-bottom: 12px;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }

    .input-main:focus-within { border-color: #111; }

    .input-main input {
      flex: 1;
      border: none;
      background: none;
      font-size: 0.95rem;
      font-family: inherit;
      color: #111;
      outline: none;
    }

    .input-main input::placeholder { color: #bbb; }

    .add-btn {
      background: #111;
      color: #fff;
      border: none;
      border-radius: 6px;
      width: 28px;
      height: 28px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .add-btn:hover { background: #333; }

    .input-meta {
      display: flex;
      gap: 10px;
    }

    .input-meta select,
    .input-meta input[type="date"] {
      flex: 1;
      border: none;
      background: #f2f2f2;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 0.8rem;
      font-family: inherit;
      color: #555;
      outline: none;
      cursor: pointer;
    }

    /* Filters */
    .filters {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
      border-bottom: 1px solid #ececec;
      padding-bottom: 0;
    }

    .filters button {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 0.82rem;
      color: #bbb;
      cursor: pointer;
      padding-bottom: 10px;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }

    .filters button.active {
      color: #111;
      border-bottom-color: #111;
      font-weight: 500;
    }

    /* List */
    .todo-list {
      display: flex;
      flex-direction: column;
    }

    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid #f0f0f0;
      animation: fadeIn 0.18s ease;
    }

    .todo-item:last-child { border-bottom: none; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Priority dot */
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 6px;
      flex-shrink: 0;
    }

    .dot-high   { background: #ef4444; }
    .dot-medium { background: #f59e0b; }
    .dot-low    { background: #22c55e; }

    .item-body { flex: 1; min-width: 0; }

    .item-text {
      font-size: 0.9rem;
      color: #111;
      line-height: 1.5;
      word-break: break-word;
    }

    .todo-item.done .item-text {
      text-decoration: line-through;
      color: #ccc;
    }

    .item-tags {
      display: flex;
      gap: 6px;
      margin-top: 5px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 0.72rem;
      color: #999;
      background: #f5f5f5;
      border-radius: 4px;
      padding: 2px 7px;
    }

    .tag.overdue { color: #ef4444; background: #fef2f2; }
    .tag.today   { color: #f59e0b; background: #fffbeb; }

    /* Checkbox custom */
    .check-wrap {
      flex-shrink: 0;
      margin-top: 2px;
    }

    .check-wrap input[type="checkbox"] {
      appearance: none;
      width: 16px;
      height: 16px;
      border: 1.5px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
      display: block;
      transition: background 0.15s, border-color 0.15s;
      position: relative;
    }

    .check-wrap input[type="checkbox"]:checked {
      background: #111;
      border-color: #111;
    }

    .check-wrap input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 3px;
      top: 1px;
      width: 5px;
      height: 8px;
      border: 1.5px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ddd;
      font-size: 0.9rem;
      cursor: pointer;
      padding: 2px 4px;
      transition: color 0.15s;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .delete-btn:hover { color: #ef4444; }

    .empty {
      text-align: center;
      color: #ccc;
      font-size: 0.85rem;
      padding: 40px 0;
    }

    /* Footer */
    .footer {
      margin-top: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer span {
      font-size: 0.78rem;
      color: #ccc;
    }

    .footer button {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 0.78rem;
      color: #ccc;
      cursor: pointer;
      transition: color 0.15s;
    }

    .footer button:hover { color: #ef4444; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>タスク</h1>
      <p id="dateLabel"></p>
    </header>

    <div class="input-area">
      <div class="input-main">
        <input id="newTask" type="text" placeholder="新しいタスクを追加..." />
        <button class="add-btn" onclick="addTask()">＋</button>
      </div>
      <div class="input-meta">
        <select id="newPriority">
          <option value="high">● 高</option>
          <option value="medium" selected>● 中</option>
          <option value="low">● 低</option>
        </select>
        <input type="date" id="newDeadline" />
      </div>
    </div>

    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">すべて</button>
      <button onclick="setFilter('active', this)">未完了</button>
      <button onclick="setFilter('done', this)">完了済み</button>
    </div>

    <div class="todo-list" id="todoList"></div>

    <div class="footer">
      <span id="countLabel"></span>
      <button onclick="clearDone()">完了済みを削除</button>
    </div>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
    let filter = 'all';

    function save() { localStorage.setItem('tasks', JSON.stringify(tasks)); }

    function todayStr() { return new Date().toISOString().slice(0, 10); }

    function formatDate(d) {
      if (!d) return null;
      const [y, m, day] = d.split('-');
      return `${m}/${day}`;
    }

    function deadlineTag(deadline) {
      if (!deadline) return '';
      const t = todayStr();
      if (deadline < t)   return `<span class="tag overdue">期限切れ ${formatDate(deadline)}</span>`;
      if (deadline === t) return `<span class="tag today">今日まで</span>`;
      return `<span class="tag">${formatDate(deadline)}</span>`;
    }

    function priorityLabel(p) {
      if (p === 'high')   return '高';
      if (p === 'medium') return '中';
      return '低';
    }

    function render() {
      const list = document.getElementById('todoList');
      const filtered = tasks.filter(t =>
        filter === 'all'    ? true :
        filter === 'active' ? !t.done : t.done
      );

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">タスクがありません</div>';
      } else {
        list.innerHTML = filtered.map(t => `
          <div class="todo-item ${t.done ? 'done' : ''}">
            <div class="check-wrap">
              <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})">
            </div>
            <span class="dot dot-${t.priority || 'medium'}"></span>
            <div class="item-body">
              <div class="item-text">${escHtml(t.text)}</div>
              <div class="item-tags">
                <span class="tag">${priorityLabel(t.priority || 'medium')}</span>
                ${deadlineTag(t.deadline)}
              </div>
            </div>
            <button class="delete-btn" onclick="remove(${t.id})">✕</button>
          </div>
        `).join('');
      }

      const remaining = tasks.filter(t => !t.done).length;
      document.getElementById('countLabel').textContent = `残り ${remaining} 件`;
    }

    function addTask() {
      const input = document.getElementById('newTask');
      const text = input.value.trim();
      if (!text) return;
      tasks.unshift({
        id: Date.now(),
        text,
        done: false,
        priority: document.getElementById('newPriority').value,
        deadline: document.getElementById('newDeadline').value || null,
      });
      input.value = '';
      document.getElementById('newDeadline').value = '';
      save(); render();
    }

    function toggle(id) {
      const t = tasks.find(t => t.id === id);
      if (t) t.done = !t.done;
      save(); render();
    }

    function remove(id) {
      tasks = tasks.filter(t => t.id !== id);
      save(); render();
    }

    function clearDone() {
      tasks = tasks.filter(t => !t.done);
      save(); render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.getElementById('newTask').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    // 今日の日付を表示
    const d = new Date();
    document.getElementById('dateLabel').textContent =
      `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;

    render();
  </script>
</body>
</html>
