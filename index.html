<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do アプリ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 2rem;
      color: #1a1a2e;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: #6c63ff; }

    .input-row button {
      padding: 12px 20px;
      background: #6c63ff;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #574fd6; }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filters button {
      flex: 1;
      padding: 8px;
      border: 2px solid #ddd;
      background: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      color: #666;
      transition: all 0.2s;
    }

    .filters button.active {
      border-color: #6c63ff;
      color: #6c63ff;
      font-weight: 600;
    }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: white;
      padding: 14px 16px;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #6c63ff;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-item .text {
      flex: 1;
      font-size: 1rem;
      color: #333;
      word-break: break-word;
    }

    .todo-item.done .text {
      text-decoration: line-through;
      color: #aaa;
    }

    .todo-item .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 1.2rem;
      line-height: 1;
      padding: 4px;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .todo-item .delete-btn:hover { color: #e74c3c; }

    .empty {
      text-align: center;
      color: #aaa;
      padding: 40px 0;
      font-size: 0.95rem;
    }

    .footer {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: #999;
    }

    .footer button {
      background: none;
      border: none;
      color: #e74c3c;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .footer button:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 To-Do</h1>

    <div class="input-row">
      <input id="newTask" type="text" placeholder="タスクを入力..." />
      <button onclick="addTask()">追加</button>
    </div>

    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">すべて</button>
      <button onclick="setFilter('active', this)">未完了</button>
      <button onclick="setFilter('done', this)">完了済み</button>
    </div>

    <div class="todo-list" id="todoList"></div>

    <div class="footer">
      <span id="countLabel"></span>
      <button onclick="clearDone()">完了済みを削除</button>
    </div>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
    let filter = 'all';

    function save() {
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function render() {
      const list = document.getElementById('todoList');
      const filtered = tasks.filter(t =>
        filter === 'all' ? true :
        filter === 'active' ? !t.done :
        t.done
      );

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">タスクがありません</div>';
      } else {
        list.innerHTML = filtered.map(t => `
          <div class="todo-item ${t.done ? 'done' : ''}" data-id="${t.id}">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})">
            <span class="text">${escHtml(t.text)}</span>
            <button class="delete-btn" onclick="remove(${t.id})">✕</button>
          </div>
        `).join('');
      }

      const remaining = tasks.filter(t => !t.done).length;
      document.getElementById('countLabel').textContent =
        `残り ${remaining} 件 / 合計 ${tasks.length} 件`;
    }

    function addTask() {
      const input = document.getElementById('newTask');
      const text = input.value.trim();
      if (!text) return;
      tasks.unshift({ id: Date.now(), text, done: false });
      input.value = '';
      save();
      render();
    }

    function toggle(id) {
      const t = tasks.find(t => t.id === id);
      if (t) t.done = !t.done;
      save();
      render();
    }

    function remove(id) {
      tasks = tasks.filter(t => t.id !== id);
      save();
      render();
    }

    function clearDone() {
      tasks = tasks.filter(t => !t.done);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.getElementById('newTask').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    render();
  </script>
</body>
</html>
